  timm_init_args:
    num_classes: 40
    model_name: convnextv2_nano.fcmae_ft_in22k_in1k_384
    pretrained: true
    drop_path_rate: 0.0
  model_init_args:
    freeze_text_encoder: false
    use_precomputed_text_embeddings: false
    vital_dropout_p: 0.1
    vitals_dropout: 0.1
