# Prior-Aware v5 Nano on CXR-LT 2024 (task1, 40 labels).
#
# Same architecture/knobs as training/prior_aware_v5nano/config.yaml; only the
# label space (40 task1 classes), the loss class frequencies, the backbone
# num_classes, and the dataframe paths differ. The 2024 images are identical to
# 2023, so the image-channel cache (../cache/channels) and text-embedding cache
# (../cache/text_embeddings) are reused verbatim -- only the prior-aware parquets
# are rebuilt in the 40-label space.
#
# Build the parquets first (see camchex/data/DATASET_FLOW.md):
#   python scripts/relabel_prepared_cxrlt.py --cxr-lt-version cxr-lt-2024 --cxr-lt-label-set task1
#   python src/prepare/04_build_prior_aware_dataset.py \
#     --in-dir data/data-camchex/cxrlt2024_task1 --in-prefix "" --splits train val test \
#     --out-dir data/data-camchex --out-prefix prior_aware_cxrlt2024_task1_ \
#     --cxr-lt-version cxr-lt-2024 --cxr-lt-label-set task1
model:
  arch: prior_aware_v5nano
  lr: 3.0e-5
  classes: &classes
    - Adenopathy
    - Atelectasis
    - Azygos Lobe
    - Calcification of the Aorta
    - Cardiomegaly
    - Clavicle Fracture
    - Consolidation
    - Edema
    - Emphysema
    - Enlarged Cardiomediastinum
    - Fibrosis
    - Fissure
    - Fracture
    - Granuloma
    - Hernia
    - Hydropneumothorax
    - Infarction
    - Infiltration
    - Kyphosis
    - Lobar Atelectasis
    - Lung Lesion
    - Lung Opacity
    - Mass
    - Nodule
    - Normal
    - Pleural Effusion
    - Pleural Other
    - Pleural Thickening
    - Pneumomediastinum
    - Pneumonia
    - Pneumoperitoneum
    - Pneumothorax
    - Pulmonary Embolism
    - Pulmonary Hypertension
    - Rib Fracture
    - Round(ed) Atelectasis
    - Subcutaneous Emphysema
    - Support Devices
    - Tortuous Aorta
    - Tuberculosis
  loss_init_args:
    # REQUIRED PLACEHOLDER -- the ASL loss has no uniform fallback; left as null it
    # raises at criterion-build time. Fill from the *train* split counts in the
    # build's sidecar (same 40-class order as `classes` above):
    #   data/data-camchex/prior_aware_cxrlt2024_task1_label_metadata.json
    #     -> splits.train.class_instance_nums   (paste the 40-value list here)
    #     -> splits.train.total_instance_num    (paste the integer here)
    # These are per-STUDY positive counts for the prior-aware parquet, NOT the
    # per-image counts in camchex_v2nano_vitals_cxrlt2024/config.yaml, so they must
    # come from this build.
    class_instance_nums: null
    total_instance_num: null
  text_model: microsoft/BiomedVLP-CXR-BERT-specialized
  timm_init_args:
    num_classes: 40
    model_name: convnextv2_nano.fcmae_ft_in22k_in1k_384
    pretrained: true
    drop_path_rate: 0.0
  model_init_args:
    d_model: 768
    transformer_layers: 2  # number of asymmetric cross-attention fusion layers
    nhead: 8
    dropout: 0.1
    freeze_text_encoder: false
    use_precomputed_text_embeddings: false
    vital_dropout_p: 0.1
    vitals_dropout: 0.1
    vitals_hidden_dim: 256
    # ---- v5 knobs (see src/model/PriorAwareV5NanoModel.py + README ablation grid) ----
    current_image_stride: 2
    n_prior_latents: 16
    pooler_nhead: 8
    prior_latent_dropout: 0.1
    context_bottleneck_dim: null
    highres_skip: true
  optimizer_init_args:
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8
  scheduler_init_args:
    schedule: single_cosine  # one cosine decay over the whole run (no per-epoch warm restarts)
    warmup_ratio: 0.05
    warmup_start_factor: 1.0e-3
    eta_min_factor: 0.1
data:
  dataloader_init_args:
    batch_size: 4
    num_workers: 0
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  datamodule_cfg:
    tokenizer: microsoft/BiomedVLP-CXR-BERT-specialized
    train_df_path: data/data-camchex/prior_aware_cxrlt2024_task1_train.parquet
    devel_df_path: data/data-camchex/prior_aware_cxrlt2024_task1_val.parquet
    pred_df_path: data/data-camchex/prior_aware_cxrlt2024_task1_test.parquet
    use_text_embedding_cache: false
    text_embedding_streams: [clin_text, prior_clin_text, prior_report_text]
    text_embedding_cache_dir: ../cache/text_embeddings
    image_channel_cache_dir: ../cache/channels
    channel_mode: raw_clahe_histeq
    size: 512
    classes: *classes
    label_dropout_p: 0.3
trainer:
  max_epochs: 30
  accumulate_grad_batches: 2
  grad_clip: 1.0
  precision: 16-mixed
  compile_model: false
  log_every_n_steps: 1
  val_check_interval: null
  quick_val_every_steps: null
  full_val_fracs: []  # no mid-epoch full validation (end-of-epoch full val always runs)
  quick_val_fracs: [0.25, 0.5, 0.75]
  quick_val_frac: 0.1
  val_num_workers: 0  # 0 = run val in-process (no 2nd worker pool); raise to use val workers
  seed: null
  accelerator: null
