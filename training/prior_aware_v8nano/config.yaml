model:
  arch: prior_aware_v8nano
  lr: 3.0e-5
  classes: &classes
    - Atelectasis
    - Calcification of the Aorta
    - Cardiomegaly
    - Consolidation
    - Edema
    - Emphysema
    - Enlarged Cardiomediastinum
    - Fibrosis
    - Fracture
    - Hernia
    - Infiltration
    - Lung Lesion
    - Lung Opacity
    - Mass
    - No Finding
    - Nodule
    - Pleural Effusion
    - Pleural Other
    - Pleural Thickening
    - Pneumomediastinum
    - Pneumonia
    - Pneumoperitoneum
    - Pneumothorax
    - Subcutaneous Emphysema
    - Support Devices
    - Tortuous Aorta
  loss_init_args:
    class_instance_nums:
      - 67597
      - 4361
      - 76900
      - 16038
      - 38574
      - 4255
      - 30119
      - 1158
      - 11883
      - 4049
      - 10218
      - 2533
      - 79931
      - 5529
      - 41869
      - 7663
      - 69240
      - 675
      - 3369
      - 788
      - 48093
      - 543
      - 14983
      - 2453
      - 89140
      - 3499
    total_instance_num: 264849
  text_model: microsoft/BiomedVLP-CXR-BERT-specialized
  timm_init_args:
    num_classes: 26
    model_name: convnextv2_nano.fcmae_ft_in22k_in1k_384
    pretrained: true
    drop_path_rate: 0.15
  model_init_args:
    # ---- v6 geometry (unchanged; v8 is head-only) ----
    d_model: 640
    transformer_layers: 2
    nhead: 8
    dropout: 0.1
    freeze_text_encoder: false
    use_precomputed_text_embeddings: false
    vital_dropout_p: 0.1
    vitals_dropout: 0.1
    vitals_hidden_dim: 256
    n_prior_latents: 16
    pooler_nhead: 8
    prior_latent_dropout: 0.1
    context_bottleneck_dim: 64
    highres_skip: true
    image_pool_type: max
    image_pool_stride: 2
    text_embed_dim: 768
    n_text_tokens: 2
    fusion_ffn_dim: 1024
    # ---- v8 label-graph head ----
    # Frozen artifact built by src/prepare/05_build_label_graph.py (train split only).
    graph_path: data/data-camchex/label_graph.pt
    # head_mode: graph -> graph-produced MLDecoder queries (v8). independent -> frozen-random
    #   queries == the v6 baseline arm, runnable through this same class for clean attribution.
    head_mode: graph
    # gnn: gcn (fixed lift-weighted propagation) | gat (learned edge attention, Duy Anh angle).
    gnn: gcn
    graph_layers: 2          # <=2 to fight over-smoothing (doc risk table)
    graph_hidden_dim: null   # null -> = decoder embedding width (768)
    graph_dropout: 0.1
    # Operative sparsifier (the 2026-06-25 gate found significance alone passes 42% of pairs,
    # so lift/top-k carry the pruning -- see docs §10). lift_threshold drops base-rate edges;
    # graph_top_k keeps each node's strongest out-edges.
    lift_threshold: 1.5
    graph_top_k: 6
    use_significance: true     # AND the BH-significant mask on top of the lift threshold
    use_hierarchy_edges: true  # union the curated clinical-hierarchy edges (doc §3.3)
    graph_dir: directed        # directed | symmetrized (edge SURVIVAL is symmetric; weights aren't)
    reweight_p: 0.25           # ML-GCN self-mass: node keeps 1-p on itself, spreads p over neighbours
    gat_heads: 4               # only used when gnn: gat
    # graph_mode: joint (recommended; GNN trained end-to-end) | pretrain_freeze (margin-ranking
    #   pretrain of Z on the graph alone, then freeze -- the structure-vs-capacity ablation, §4C).
    graph_mode: joint
    graph_pretrain_steps: 400  # only used when graph_mode: pretrain_freeze
    # graph_prior_label: route the prior study's label vector through the graph embeddings Z
    #   (secondary injection) instead of the bare Linear. Off by default.
    graph_prior_label: false
    # graph_consistency_lambda: >0 turns on the soft co-occurrence consistency aux loss (§4B),
    #   detached-coupled like the background penalty. 0.0 = structural prior only (baseline v8).
    graph_consistency_lambda: 0.0
  optimizer_init_args:
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8
  scheduler_init_args:
    schedule: single_cosine
    warmup_ratio: 0.05
    warmup_start_factor: 1.0e-3
    eta_min_factor: 0.1
data:
  dataloader_init_args:
    batch_size: 4
    num_workers: 0
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  datamodule_cfg:
    tokenizer: microsoft/BiomedVLP-CXR-BERT-specialized
    train_df_path: data/data-camchex/prior_aware_train.parquet
    devel_df_path: data/data-camchex/prior_aware_development.parquet
    pred_df_path: data/data-camchex/prior_aware_test.parquet
    use_text_embedding_cache: false
    text_embedding_streams: [clin_text, prior_clin_text, prior_report_text]
    text_embedding_cache_dir: ../cache/text_embeddings
    text_embedding_batch_size: 32
    text_embedding_device: auto
    image_channel_cache_dir: ../cache/channels
    channel_mode: raw_clahe_histeq
    size: 512
    classes: *classes
    label_dropout_p: 0.3
trainer:
  max_epochs: 30
  accumulate_grad_batches: 2
  grad_clip: 1.0
  precision: 16-mixed
  compile_model: false
  log_every_n_steps: 1
  val_check_interval: null
  quick_val_every_steps: null
  full_val_fracs: []
  quick_val_fracs: []
  quick_val_frac: 0.1
  val_num_workers: 0
  seed: null
  accelerator: null
  gradcam_epochs: none
