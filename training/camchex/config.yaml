  timm_init_args:
    num_classes: 26
    model_name: convnext_small.fb_in22k_ft_in1k
    pretrained: true
    drop_path_rate: 0.0
  optimizer_init_args:
    weight_decay: 0.01
    betas: [0.9, 0.999]
