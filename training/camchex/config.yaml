  scheduler_init_args:
    warmup_ratio: 0.05
    warmup_start_factor: 1.0e-3
    eta_min_factor: 0.1
data:
  dataloader_init_args:
    batch_size: 4
    num_workers: 0
    pin_memory: true
    persistent_workers: true
    prefetch_factor: 2
  datamodule_cfg:
    tokenizer: dmis-lab/biobert-v1.1
    train_df_path: data/data-camchex/03_mimic_train.csv
    devel_df_path: data/data-camchex/03_mimic_development.csv
    pred_df_path: data/data-camchex/03_mimic_test.csv
    size: 512
    classes: *classes
trainer:
  max_epochs: 30
  accumulate_grad_batches: 1
  grad_clip: 1.0
  precision: 16-mixed
  compile_model: false
  log_every_n_steps: 1
  val_check_interval: null
  quick_val_every_steps: null
  quick_val_frac: 0.1
  seed: null
  accelerator: null
